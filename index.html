<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marsper Portfolio</title>
    <link rel="stylesheet" href="main.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 鼠标聚光灯 -->
    <div class="cursor-spotlight"></div>

    <!-- 粒子特效画布 -->
    <canvas id="particleCanvas"></canvas>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="logo">MARSPER.</div>
        <ul class="nav-links">
            <li><a href="#works">WORKS</a></li>
            <li><a href="#experience">EXPERIENCE</a></li>
            <li><a href="#honors">HONORS</a></li>
            <li><a href="#skills">SKILLS</a></li>
        </ul>
    </nav>

    <!-- Main Visual Section -->
    <main class="hero-section">
        <div class="hero-content">
            <h1 class="hero-title">
                <div>HELLO</div>
                <div>I'M</div>
                <div class="name-group">
                    <div>WANG</div>
                    <div>YUZIXUAN</div>
                </div>
            </h1>
            <div class="tags">
                <div class="tag">UI/UX DESIGN</div>
                <div class="tag">MODELING</div>
                <div class="tag">EXTRA SKILLS</div>
            </div>
        </div>
    </main>

    <!-- WORKS SECTION (01) -->
    <section id="works" class="works-section">
        <!-- 巨大背景氛围字 -->
        <div class="marquee-bg">
            <span aria-hidden="true">EXPERIENCE RESEARCH DESIGN</span>
        </div>
        
        <div class="section-inner">
            <div class="section-label">● 01 // SELECTED WORKS</div>
            
            <div class="project-card">
                <div class="project-info">
                    <h2 class="project-title">LATE-NIGHT MEDIA KILLER</h2>
                    <div class="project-tags">interaction & Product Design</div>
                </div>
                <div class="project-image">
                    <div class="phone-mockup-placeholder">
                        <span style="opacity: 0.5;">[ PHOEN MOCKUP ]</span>
                    </div>
                </div>
            </div>
            
        </div>
    </section>

    <script src="main.js"></script>
</body>
</html>
